spring.datasource.url=jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5433}/${DATABASE_NAME:job_portal_api}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:true}
spring.jpa.open-in-view=false


spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true
spring.docker.compose.enabled=true

# Cache configuration
cache.jobs.ttl-minutes=${CACHE_JOBS_TTL_MINUTES:10}
cache.jobs.max-size=${CACHE_JOBS_MAX_SIZE:5000}

cache.companies.ttl-minutes=${CACHE_COMPANIES_TTL_MINUTES:10}
cache.companies.max-size=${CACHE_COMPANIES_MAX_SIZE:500}

cache.roles.ttl-days=${CACHE_ROLES_TTL_DAYS:1}
cache.roles.max-size=${CACHE_ROLES_MAX_SIZE:100}

# CORS configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
app.cors.allowed-headers=${CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,Origin}
app.cors.exposed-headers=${CORS_EXPOSED_HEADERS:Authorization}
app.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
app.cors.max-age=${CORS_MAX_AGE:3600}

# JWT configuration
app.jwt.secret=${JWT_SECRET:PercyBuilderHireJwtSecretKeyForDevelopmentOnlyMustBeLongEnoughForHS256}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.issuer=${JWT_ISSUER:percybuilder-hire-api}