# Production profile for PercyBuilder Hire API

server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT:5432}/${DATABASE_NAME}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

spring.docker.compose.enabled=false

# Production logging
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.percybuilder.jobportalapi=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.level.org.hibernate.SQL=WARN

# Production CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
app.cors.allowed-headers=${CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,Origin}
app.cors.exposed-headers=${CORS_EXPOSED_HEADERS:Authorization}
app.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
app.cors.max-age=${CORS_MAX_AGE:3600}

# Production JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.issuer=${JWT_ISSUER:percybuilder-hire-api}

# Production cache
cache.jobs.ttl-minutes=${CACHE_JOBS_TTL_MINUTES:5}
cache.jobs.max-size=${CACHE_JOBS_MAX_SIZE:5000}

cache.companies.ttl-minutes=${CACHE_COMPANIES_TTL_MINUTES:5}
cache.companies.max-size=${CACHE_COMPANIES_MAX_SIZE:500}

cache.roles.ttl-days=${CACHE_ROLES_TTL_DAYS:1}
cache.roles.max-size=${CACHE_ROLES_MAX_SIZE:100}

# Disable developer tools in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
spring.h2.console.enabled=false